{{ define "content-pt" }}
<h1>Signup Verification</h1>
<p>Please verify your email address, set your password, and read and agree the agreement to finish signup.</p>
<form id='registerForm' class='form'>
    <div class='field'>
        <div class='label'><label class='required' for='emailInput'>Email Address</label></div>
        <div>
            <input type='email' id='emailInput' placeholder='Enter address email here' required autofocus />
        </div>
    </div>
    <div class='field spacer-top'>
        <div class='label'><label for='nameInput'>Name</label></div>
        <div>
            <input type='text' id='nameInput' placeholder='Enter name here' />
        </div>
    </div>
    <div class='field spacer-top'>
        <div class='label'><label class='required' for='passwordInput'>Password</label></div>
        <div>
            <div>
                <input type='password' id='passwordInput' placeholder='Enter new password here' minlength='8' maxlength='64' required autofocus />
            </div>
            <ul class='password'>
                <li>Minimum 8 characters</li>
                <li>Maximum 64 characters</li>
                <li>
                    <div>Must contains:</div>
                    <ul class='passwordChar'>
                        <li>Lower case</li>
                        <li>Upper case</li>
                        <li>Digit</li>
                        <li>Symbol</li>
                    </ul>
                </li>
                </li>
            </ul>
        </div>
    </div>
    <div class='field spacer-top'>
        <div class='label'><label class='required' for='password2Input'>Confirm password</label></div>
        <div>
            <input type='password' id='password2Input' placeholder='Confirm password here' minlength='8' maxlength='64' required />
        </div>
    </div>
    <div class='field spacer-top'>
        <div class='label'>
            <label class='required' for='ageementInput'>Agreement</label>
        </div>
        <div>
            <input type='checkbox' id='ageementInput' required />
            <label for='ageementInput' class='noContent'>I agree to the <a href="/terms">Terms of Service</a></label>
        </div>
    </div>
    <div class='message spacer-top'>
        <div id='messageElement'>&nbsp;</div>
    </div>
    <div class='button spacer-top'>
        <button type='button' id='submitButton'>Finish</button>
    </div>
</form>
{{ end }}
