{{ define "content-pt" }}
<h1>{{ .T .Title }}</h1>
<div id='viewMessage' class='loading'>Loading ...</div>
<div class='view spacer-top'>
    <div class='field'>
        <div class='label'>Donation Id</div>
        <div class='value' id='donationId'></div>
    </div>
    <div class='field'>
        <div class='label'>Date</div>
        <div class='value' id='dateTime'></div>
    </div>
    <div class='field'>
        <div class='label'>Munfiq Name</div>
        <div class='value' id='munfiqName'></div>
    </div>
    <div class='field'>
        <div class='label'>Payment</div>
        <div class='value' id='payment'></div>
    </div>
    <div class='field'>
        <div class='label'>Amount</div>
        <div class='value' id='amount'></div>
    </div>
    <div class='field'>
        <div class='label'>Status</div>
        <div class='value' id='status'></div>
    </div>
</div>
{{ end }}
